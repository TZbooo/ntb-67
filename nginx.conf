events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # 1. Редирект с HTTP (порт 80) на HTTPS
    server {
        listen 80;
        server_name 24tunl.ru *.24tunl.ru;

        return 301 https://$host$request_uri;
    }

    # 2. Основной HTTPS сервер (порт 443)
    server {
        listen 443 ssl;
        server_name 24tunl.ru *.24tunl.ru;

        # Пути к сертификатам (внутри контейнера, как мы указали в volumes)
        ssl_certificate     /etc/nginx/ssl/live/24tunl.ru/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/live/24tunl.ru/privkey.pem;

        # Базовые настройки безопасности SSL
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # Раздача статики (например, твой index.html)
        location / {
            root   /usr/share/nginx/html;
            index  index.html index.htm;
        }

        # ТВОЙ БУДУЩИЙ ТУННЕЛЬ: Сюда ты потом добавишь проксирование на ntb-67 сервер
        # location / {
        #     proxy_pass http://my-tunnel-server:8000;
        #     proxy_set_header Host $host;
        #     proxy_set_header X-Forwarded-Proto $scheme;
        # }
    }
}