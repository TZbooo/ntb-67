user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log notice;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    types_hash_max_size 2048;

    # Самое важное: включаем поддержку Websockets и потоков
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # Описываем правила маршрутизации для нашего домена 24tunl.ru
    
    # 1. Редирект с HTTP на HTTPS для основного домена и всех поддоменов
    server {
        listen 80;
        listen [::]:80;
        server_name 24tunl.ru *.24tunl.ru;
        return 301 https://$host$request_uri;
    }

    # 2. Основной домен — ЛЕНДИНГ (Файлы отдаются из контейнера)
    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        server_name 24tunl.ru;

        # Пути внутри контейнера (обратите внимание на префикс /etc/nginx/ssl/)
        ssl_certificate     /etc/nginx/ssl/live/24tunl.ru/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/live/24tunl.ru/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        # Папка с лендингом внутри контейнера
        root /usr/share/nginx/html;
        index index.html;

        location / {
            try_files $uri $uri/ =404;
        }
    }

    # 3. Динамические поддомены — Проброс в ntb-67 (на хост-машину)
    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        server_name *.24tunl.ru;

        ssl_certificate     /etc/nginx/ssl/live/24tunl.ru/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/live/24tunl.ru/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        location / {
            # host.docker.internal указывает на саму Ubuntu (наш хост), где слушает ntb-67
            proxy_pass http://host.docker.internal:8000;

            # Заголовки, необходимые для работы туннеля
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https; # Клиент зашел по HTTPS

            # Поддержка WebSockets и долгоживущих соединений
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            # Отключаем буферизацию (критично для туннелирования байт в реальном времени)
            proxy_buffering off;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }
    }
}