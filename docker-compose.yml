services:
  ntb-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ntb-proxy-server
    ports:
      - "8000:8000"
      - "9000:9000"
    restart: always

  nginx:
    image: nginx:latest
    container_name: nginx-proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./html:/usr/share/nginx/html:ro
      - /etc/letsencrypt:/etc/nginx/ssl:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - ntb-server
    restart: always